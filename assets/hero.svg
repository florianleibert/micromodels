<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F1E6"/>
      <stop offset="0.5" stop-color="#EADDC8"/>
      <stop offset="1" stop-color="#D8C3A9"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFDF8"/>
      <stop offset="1" stop-color="#FDF4E6"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1A3744"/>
      <stop offset="1" stop-color="#0F2129"/>
    </linearGradient>
    <linearGradient id="barDflash" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#2B566A"/>
      <stop offset="1" stop-color="#17313B"/>
    </linearGradient>
    <linearGradient id="barPlain" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#CDB59A"/>
      <stop offset="1" stop-color="#A8886A"/>
    </linearGradient>
    <filter id="shadow" x="60" y="60" width="1160" height="520" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#5A4632" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="#EFE5D6"/>
  <rect x="32" y="28" width="1216" height="584" rx="32" fill="url(#bg)"/>
  <circle cx="1172" cy="96" r="132" fill="#FFFDF6" fill-opacity="0.55"/>
  <circle cx="116" cy="560" r="166" fill="#C9B091" fill-opacity="0.35"/>

  <g filter="url(#shadow)">
    <rect x="88" y="80" width="1104" height="480" rx="30" fill="url(#card)"/>
  </g>

  <!-- Badge -->
  <rect x="132" y="122" width="176" height="38" rx="19" fill="url(#ink)"/>
  <circle cx="153" cy="141" r="5" fill="#86E2A2"/>
  <text x="168" y="147" fill="#F2F7F8" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="1.8">APPLE SILICON</text>

  <!-- Title -->
  <text x="132" y="228" fill="#17313B" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="700" letter-spacing="-1.2">micromodel-ship</text>

  <!-- Subtitle -->
  <text x="132" y="270" fill="#5A4E42" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20">Fast exact local inference for Qwen3-4B with DFlash</text>
  <text x="132" y="298" fill="#5A4E42" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20">speculative decoding. Bundled payload, OpenAI-compatible API.</text>

  <!-- Benchmark chart on right -->
  <text x="750" y="146" fill="#8A7A68" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2.2">DECODE SPEED · TOKENS / SEC</text>

  <text x="750" y="188" fill="#6A5E52" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15">Plain MLX-LM BF16</text>
  <rect x="750" y="200" width="103" height="34" rx="6" fill="url(#barPlain)"/>
  <text x="866" y="224" fill="#17313B" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="700">55</text>

  <text x="750" y="262" fill="#6A5E52" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15">DFlash speculative (this repo)</text>
  <rect x="750" y="274" width="358" height="34" rx="6" fill="url(#barDflash)"/>
  <text x="1122" y="298" fill="#17313B" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" font-weight="700">191</text>

  <!-- Speedup pill -->
  <rect x="1038" y="214" width="72" height="34" rx="17" fill="#17313B"/>
  <text x="1074" y="237" fill="#F4F8F9" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="700" text-anchor="middle">3.5×</text>

  <text x="750" y="352" fill="#8A7A68" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="1.5">APPLE M5 MAX · 512 TOKENS · PARALLEL-REPLAY</text>

  <!-- Stat row -->
  <rect x="132" y="410" width="326" height="102" rx="20" fill="url(#ink)"/>
  <text x="158" y="446" fill="#A3C8D6" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">DFLASH DECODE</text>
  <text x="158" y="491" fill="#F4F8F9" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="36" font-weight="700">159–191 tok/s</text>

  <rect x="478" y="410" width="258" height="102" rx="20" fill="#F2E1CE"/>
  <text x="504" y="446" fill="#8A6F52" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">SPEEDUP VS MLX</text>
  <text x="504" y="491" fill="#17313B" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="36" font-weight="700">3.3× – 3.8×</text>

  <rect x="756" y="410" width="402" height="102" rx="20" fill="#F8EEDE"/>
  <text x="782" y="446" fill="#8A6F52" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="1.8">WHAT SHIPS</text>
  <text x="782" y="491" fill="#17313B" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="700">runtime · API · benchmarks · models</text>
</svg>
